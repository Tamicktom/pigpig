name: pigpig

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${FORWARD_DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${DB_DATABASE:-pigpig}"
      POSTGRES_USER: "${DB_USERNAME:-pigpig}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - pigpig-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - pigpig-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.21
    ports:
      - "${FORWARD_MAILPIT_UI_PORT:-8025}:8025"
      - "${FORWARD_MAILPIT_SMTP_PORT:-1025}:1025"

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: app
    ports:
      - "${FORWARD_APP_PORT:-8000}:8000"
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/up >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 120s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: worker
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  vite:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: vite
    working_dir: /var/www/html
    ports:
      - "${FORWARD_VITE_PORT:-5173}:5173"
    environment:
      VITE_USE_FILE_POLLING: "true"
      VITE_HMR_CLIENT_PORT: "${FORWARD_VITE_PORT:-5173}"
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pigpig-postgres:
  pigpig-redis:
